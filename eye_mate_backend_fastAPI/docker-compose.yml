version: '3.8'

services:
  # vLLM inference engine (NVIDIA DGX Spark optimized container)
  vllm:
    image: nvcr.io/nvidia/vllm:latest
    container_name: eyemate-vllm
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    command: >
      --model google/gemma-4-E4B-it
      --host 0.0.0.0
      --port 8000
      --dtype auto
      --max-model-len 8192
      --gpu-memory-utilization 0.90
      --trust-remote-code
      --enable-chunked-prefill
      --enable-prefix-caching
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # FastAPI backend (connects to vLLM container via OpenAI-compatible API)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: eyemate-backend
    depends_on:
      vllm:
        condition: service_healthy
    environment:
      - VLLM_API_URL=http://vllm:8000
      - HOST=0.0.0.0
      - PORT=8080
      - LOG_LEVEL=INFO
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py

networks:
  default:
    name: eyemate-network
